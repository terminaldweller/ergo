services:
  nginx:
    image: nginx:stable
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
    ports:
      - "3113:443"
    networks:
      - hugonet
    restart: unless-stopped
    security_opt:
      - no-new-privileges
    read_only: true
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=64m
      - /run:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/portfolio.terminaldweller.com/privkey.pem:/etc/letsencrypt/live/portfolio.terminaldweller.com/privkey.pem:ro
      - /etc/letsencrypt/live/portfolio.terminaldweller.com/fullchain.pem:/etc/letsencrypt/live/portfolio.terminaldweller.com/fullchain.pem:ro
      - ./srv:/usr/share/nginx/html:ro
networks:
  hugonet:
    enable_ipv6: true
